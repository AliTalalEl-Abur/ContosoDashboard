openapi: 3.0.3
info:
  title: ContosoDashboard Document Management API
  version: 1.0.0
  description: API contract for document upload, retrieval, sharing, and audit operations.
servers:
  - url: /api
security:
  - cookieAuth: []
paths:
  /documents:
    post:
      summary: Upload a document
      operationId: uploadDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, title, category]
              properties:
                file:
                  type: string
                  format: binary
                title:
                  type: string
                  maxLength: 200
                category:
                  type: string
                  enum: [Project Documents, Team Resources, Personal Files, Reports, Presentations, Other]
                description:
                  type: string
                  maxLength: 2000
                tags:
                  type: array
                  items:
                    type: string
                projectId:
                  type: integer
                  format: int32
                  nullable: true
      responses:
        '201':
          description: Document created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentDto'
        '400':
          description: Validation error (size/type/required fields)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

    get:
      summary: List documents visible to current user
      operationId: listDocuments
      parameters:
        - in: query
          name: scope
          schema:
            type: string
            enum: [mine, project, shared, all]
            default: mine
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: projectId
          schema:
            type: integer
            format: int32
        - in: query
          name: fromDate
          schema:
            type: string
            format: date-time
        - in: query
          name: toDate
          schema:
            type: string
            format: date-time
        - in: query
          name: sort
          schema:
            type: string
            enum: [title, uploadedAt, category, size]
            default: uploadedAt
        - in: query
          name: direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Document page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedDocumentResult'

  /documents/search:
    get:
      summary: Search documents visible to current user
      operationId: searchDocuments
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 1
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedDocumentResult'

  /documents/{documentId}:
    get:
      summary: Get document metadata
      operationId: getDocument
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Document metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentDto'
        '403':
          description: Forbidden
        '404':
          description: Not found

    patch:
      summary: Update document metadata
      operationId: updateDocumentMetadata
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDocumentRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentDto'
        '403':
          description: Forbidden
        '404':
          description: Not found

    delete:
      summary: Delete a document permanently
      operationId: deleteDocument
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Deleted
        '403':
          description: Forbidden
        '404':
          description: Not found

  /documents/{documentId}/download:
    get:
      summary: Download document file
      operationId: downloadDocument
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Binary file stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '403':
          description: Forbidden
        '404':
          description: Not found

  /documents/{documentId}/replace:
    post:
      summary: Replace document file content
      operationId: replaceDocumentFile
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentDto'
        '400':
          description: Validation error
        '403':
          description: Forbidden
        '404':
          description: Not found

  /documents/{documentId}/share:
    post:
      summary: Share document with users and/or a project
      operationId: shareDocument
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareDocumentRequest'
      responses:
        '204':
          description: Shared and notifications queued
        '400':
          description: Invalid recipients
        '403':
          description: Forbidden
        '404':
          description: Not found

  /documents/activity:
    get:
      summary: Admin-only activity log
      operationId: getDocumentActivity
      parameters:
        - in: query
          name: actionType
          schema:
            type: string
            enum: [Upload, Download, Share, UpdateMetadata, ReplaceFile, Delete]
        - in: query
          name: actorUserId
          schema:
            type: integer
            format: int32
        - in: query
          name: documentId
          schema:
            type: integer
            format: int32
        - in: query
          name: fromDate
          schema:
            type: string
            format: date-time
        - in: query
          name: toDate
          schema:
            type: string
            format: date-time
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Activity page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedActivityResult'
        '403':
          description: Forbidden (non-admin)

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: .AspNetCore.Cookies

  schemas:
    DocumentDto:
      type: object
      required: [id, title, category, originalFileName, mimeType, fileSizeBytes, uploadedAtUtc, uploadedByUserId]
      properties:
        id:
          type: integer
          format: int32
        title:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        originalFileName:
          type: string
        mimeType:
          type: string
        fileSizeBytes:
          type: integer
          format: int64
        uploadedAtUtc:
          type: string
          format: date-time
        uploadedByUserId:
          type: integer
          format: int32
        projectId:
          type: integer
          format: int32
          nullable: true
        source:
          type: string
          description: Result source bucket (Mine, Shared, Project)

    UpdateDocumentRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        category:
          type: string
        tags:
          type: array
          items:
            type: string

    ShareDocumentRequest:
      type: object
      properties:
        userIds:
          type: array
          items:
            type: integer
            format: int32
        projectId:
          type: integer
          format: int32
          nullable: true
        message:
          type: string
          maxLength: 500
      description: At least one recipient target is required.

    DocumentActivityDto:
      type: object
      required: [id, documentId, actorUserId, actionType, occurredAtUtc]
      properties:
        id:
          type: integer
          format: int32
        documentId:
          type: integer
          format: int32
        actorUserId:
          type: integer
          format: int32
        actionType:
          type: string
        occurredAtUtc:
          type: string
          format: date-time
        detailsJson:
          type: string
          nullable: true

    PagedDocumentResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DocumentDto'
        page:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer

    PagedActivityResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DocumentActivityDto'
        page:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
